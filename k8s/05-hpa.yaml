# HorizontalPodAutoscaler for product-service (the read-heavy service).
#
# Scales replicas automatically based on CPU. "averageUtilization: 70" means
# "keep each pod near 70% of its CPU *request*" — so this REQUIRES the resources.requests
# set in 03-apps.yaml (the request is the denominator the percentage is measured against).
#
# Production choices:
#   minReplicas: 2  -> never a single point of failure (survive one pod/node loss)
#   maxReplicas: 6  -> cap blast radius / cost; sized to fit the cluster
#   target 70%      -> headroom: scale before pods are maxed, not after
#   behavior        -> eager scale-up, cautious scale-down (avoid flapping)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: product-service
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: product-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0      # react immediately to load
      policies:
        - type: Percent
          value: 100                      # at most double the pods per step
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300     # wait 5 min of low load before shrinking
      policies:
        - type: Pods
          value: 1                        # remove at most 1 pod per step
          periodSeconds: 60
