# Dev profile: H2 in-memory, zero setup. Activate with SPRING_PROFILES_ACTIVE=dev.
# Overrides the Postgres datasource + dialect from the base application.properties.

spring.datasource.url=jdbc:h2:mem:ordersdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# The base file hardcodes PostgreSQLDialect — override it so Hibernate talks H2.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Browse the in-memory DB at http://localhost:8082/h2-console (JDBC URL: jdbc:h2:mem:ordersdb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
