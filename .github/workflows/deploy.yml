name: Build and Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/spring-boot-0:$IMAGE_TAG .
          docker push $ECR_REGISTRY/spring-boot-0:$IMAGE_TAG

      - name: Create Dockerrun.aws.json
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "'$ECR_REGISTRY'/spring-boot-0:'$IMAGE_TAG'",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 8080
              }
            ]
          }' > Dockerrun.aws.json

      - name: Ensure environment is Ready
        run: |
          STATUS=$(aws elasticbeanstalk describe-environments \
            --environment-names Spring-boot-0-Docker-Main \
            --query 'Environments[0].Status' --output text)
          if [ "$STATUS" != "Ready" ]; then
            echo "Environment status is $STATUS, waiting for Ready..."
            aws elasticbeanstalk rebuild-environment \
              --environment-name Spring-boot-0-Docker-Main || true
            sleep 30
            aws elasticbeanstalk wait environment-updated \
              --environment-names Spring-boot-0-Docker-Main
          fi

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: eu-north-1
          application_name: spring-boot-0
          environment_name: Spring-boot-0-Docker-Main
          version_label: ${{ github.sha }}
          deployment_package: Dockerrun.aws.json
          use_existing_version_if_available: true