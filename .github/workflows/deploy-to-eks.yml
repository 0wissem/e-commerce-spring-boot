name: Deploy app to EKS

# Deploys the k8s/eks manifests to the EKS cluster from CI, using the OIDC terraform
# role (which is the cluster's admin). Removes the need for CloudShell.
# Runs on push to dev when the manifests (or this file) change = a real CD step.
on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - "k8s/eks/**"
      - "k8s/00-namespace.yaml"
      - "k8s/01-config.yaml"
      - ".github/workflows/deploy-to-eks.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::110911131381:role/github-actions-terraform
          aws-region: eu-west-3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Point kubectl at the cluster
        run: aws eks update-kubeconfig --name ecommerce --region eu-west-3

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl apply -f k8s/eks/config.yaml
          # DBs are external (RDS) now — remove any in-cluster Postgres to free pod slots
          kubectl delete -f k8s/eks/postgres.yaml --ignore-not-found
          # t3.micro is pod-slot constrained: free one by running a single CoreDNS replica
          kubectl scale deployment coredns -n kube-system --replicas=1 || true
          # CLEAN SLATE: drop old app deployments (clears ReplicaSet sprawl from retries),
          # then re-create fresh so exactly 4 pods land in the freed slots.
          kubectl delete deployment monolith product-service order-service gateway -n ecommerce --ignore-not-found
          kubectl delete pods -n ecommerce --field-selector=status.phase=Pending --ignore-not-found || true
          kubectl apply -f k8s/eks/apps.yaml

      - name: Show state (and explain any non-Running pods)
        run: |
          echo "=== nodes ==="
          kubectl get nodes -o wide
          echo "=== pods ==="
          sleep 120 # let Spring Boot + RDS connect + Flyway run before we check/test
          kubectl get pods -n ecommerce -o wide
          echo "=== events for any non-Running pod ==="
          kubectl get pods -n ecommerce --no-headers | grep -v ' Running ' | awk '{print $1}' | while read p; do
            echo "### $p"; kubectl describe pod "$p" -n ecommerce | grep -A6 Events:
          done || true

      - name: Smoke test APIs (port-forward from runner — only Running services respond)
        run: |
          test_svc() { # name svc port path
            kubectl port-forward -n ecommerce "svc/$2" "$3:$3" >/dev/null 2>&1 &
            pid=$!; sleep 5
            echo "--- $1 ($4) ---"
            curl -s -m 10 -w "\n[HTTP %{http_code}]\n" "http://localhost:$3$4" 2>&1 | head -c 400 || echo "unreachable (pod Pending?)"
            echo; kill $pid 2>/dev/null
          }
          test_svc monolith        monolith        8080 /api/customers
          test_svc product-service product-service 8081 /api/products
          test_svc order-service   order-service   8082 /api/orders
          test_svc gateway         gateway         8082 /api/products || true
