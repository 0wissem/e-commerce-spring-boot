# EKS variant of the four services. Only difference vs the minikube version:
#   • image  → pulled from ECR (110911131381.dkr.ecr.eu-west-3.amazonaws.com/<name>:latest)
#   • imagePullPolicy: Always → re-pull :latest each time (nodes have ECR read via their IAM role)
# Everything else (config, secrets, DB wiring, probes, resources) is unchanged.

# ---------- monolith (customers) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: monolith
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monolith
  template:
    metadata:
      labels:
        app: monolith
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-monolith 5432; do echo "waiting for db"; sleep 2; done']
      containers:
        - name: monolith
          image: 110911131381.dkr.ecr.eu-west-3.amazonaws.com/spring-boot-0:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef: { name: monolith-config }
          env:
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: monolith
  namespace: ecommerce
spec:
  selector:
    app: monolith
  ports:
    - port: 8080
      targetPort: 8080
---
# ---------- product-service (the read-heavy service the HPA scales) ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-products 5432; do echo "waiting for db"; sleep 2; done']
      containers:
        - name: product-service
          image: 110911131381.dkr.ecr.eu-west-3.amazonaws.com/product-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: { name: product-service-config }
          env:
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: db-credentials, key: username } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: db-credentials, key: password } }
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: ecommerce
spec:
  selector:
    app: product-service
  ports:
    - port: 8081
      targetPort: 8081
---
