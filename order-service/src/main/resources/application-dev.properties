# Dev profile: local PostgreSQL (run one in Docker). Activate with SPRING_PROFILES_ACTIVE=dev.
# Postgres everywhere — no H2. Only the connection target differs from prod;
# the base application.properties already sets the PostgreSQL dialect.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orders}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
