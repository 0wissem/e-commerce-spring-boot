name: Build and Deploy Product Service to Elastic Beanstalk

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'preprod'
        type: choice
        options: [preprod, prod]
  push:
    branches:
      - master
      - dev
    paths:
      - 'product-service/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/product-service:$IMAGE_TAG ./product-service
          docker push $ECR_REGISTRY/product-service:$IMAGE_TAG

      - name: Create Dockerrun.aws.json
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "'$ECR_REGISTRY'/product-service:'$IMAGE_TAG'",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 8081
              }
            ]
          }' > Dockerrun.aws.json

      - name: Set environment variables based on branch
        run: |
          IS_PROD="false"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then IS_PROD="true"; fi
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then IS_PROD="true"; fi

          if [ "$IS_PROD" = "true" ]; then
            echo "ENV_NAME=${{ secrets.PRODUCT_SERVICE_EB_ENV }}" >> $GITHUB_ENV
            echo "APP_NAME=product-service" >> $GITHUB_ENV
            echo "EB_REGION=eu-north-1" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.SPRING_DATASOURCE_URL }}" >> $GITHUB_ENV
            echo "DB_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}" >> $GITHUB_ENV
            echo "DB_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "ENV_NAME=${{ secrets.PREPROD_PRODUCT_SERVICE_EB_ENV }}" >> $GITHUB_ENV
            echo "APP_NAME=preprod" >> $GITHUB_ENV
            echo "EB_REGION=eu-west-3" >> $GITHUB_ENV
            echo "DB_URL=${{ secrets.PREPROD_PRODUCT_SERVICE_DB_URL }}" >> $GITHUB_ENV
            echo "DB_USERNAME=${{ secrets.PREPROD_PRODUCT_SERVICE_DB_USERNAME }}" >> $GITHUB_ENV
            echo "DB_PASSWORD=${{ secrets.PREPROD_PRODUCT_SERVICE_DB_PASSWORD }}" >> $GITHUB_ENV
          fi

      - name: 📋 Deployment target
        run: |
          if [ "${{ env.IS_PROD }}" = "true" ]; then
            echo "Target: PRODUCT-SERVICE → PROD (eu-north-1)"
          else
            echo "Target: PRODUCT-SERVICE → PREPROD (eu-west-3)"
          fi

      - name: Wait for environment to be Ready
        run: |
          for i in $(seq 1 20); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name ${{ env.APP_NAME }} \
              --environment-names ${{ env.ENV_NAME }} \
              --region ${{ env.EB_REGION }} \
              --query 'Environments[0].Status' --output text)
            echo "Status: $STATUS"
            [ "$STATUS" = "Ready" ] && break
            sleep 30
          done

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ env.EB_REGION }}
          application_name: ${{ env.APP_NAME }}
          environment_name: ${{ env.ENV_NAME }}
          version_label: ${{ github.sha }}-product-service
          deployment_package: Dockerrun.aws.json
          use_existing_version_if_available: true
          wait_for_environment_recovery: 60