name: Build and Deploy Gateway to Elastic Beanstalk

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/gateway:$IMAGE_TAG ./gateway
          docker push $ECR_REGISTRY/gateway:$IMAGE_TAG

      - name: Create Dockerrun.aws.json
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "'$ECR_REGISTRY'/gateway:'$IMAGE_TAG'",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 8082
              }
            ]
          }' > Dockerrun.aws.json

      - name: Set gateway environment variables
        run: |
          aws elasticbeanstalk wait environment-updated \
            --environment-names ${{ secrets.GATEWAY_EB_ENV }}
          aws elasticbeanstalk update-environment \
            --environment-name ${{ secrets.GATEWAY_EB_ENV }} \
            --option-settings \
              Namespace=aws:elasticbeanstalk:application:environment,OptionName=PRODUCT_SERVICE_WEIGHT,Value=100
          aws elasticbeanstalk wait environment-updated \
            --environment-names ${{ secrets.GATEWAY_EB_ENV }}

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: eu-north-1
          application_name: gateway
          environment_name: ${{ secrets.GATEWAY_EB_ENV }}
          version_label: ${{ github.sha }}
          deployment_package: Dockerrun.aws.json
          use_existing_version_if_available: true