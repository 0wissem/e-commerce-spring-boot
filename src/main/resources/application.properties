spring.application.name=spring-boot-0
server.port=${SERVER_PORT:8080}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT signing secret (HMAC HS256 — must be >= 256 bits / 32 chars). Override via env in prod.
jwt.secret=${JWT_SECRET:dev-secret-change-me-please-0123456789abcdef0123456789abcdef}
# Token lifetime in seconds (default 1h)
jwt.ttl-seconds=${JWT_TTL_SECONDS:3600}
