name: Deploy app to EKS

# Deploys the k8s/eks manifests to the EKS cluster from CI, using the OIDC terraform
# role (which is the cluster's admin). Removes the need for CloudShell.
# Runs on push to dev when the manifests (or this file) change = a real CD step.
# MANUAL-ONLY. The EKS control plane is NOT free-tier — a push must never be
# able to deploy to (or implicitly recreate) the cluster.
on:
  workflow_dispatch:
  # push:
  #   branches: [dev]
  #   paths:
  #     - "k8s/eks/**"
  #     - "k8s/00-namespace.yaml"
  #     - "k8s/01-config.yaml"
  #     - ".github/workflows/deploy-to-eks.yml"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::110911131381:role/github-actions-terraform
          aws-region: eu-west-3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Point kubectl at the cluster
        run: aws eks update-kubeconfig --name ecommerce --region eu-west-3

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          # Fetch LIVE RDS endpoints (they change on every recreate) and build config from them
          MONO=$(aws rds describe-db-instances --db-instance-identifier ecommerce-monolith --query 'DBInstances[0].Endpoint.Address' --output text)
          PROD=$(aws rds describe-db-instances --db-instance-identifier ecommerce-products --query 'DBInstances[0].Endpoint.Address' --output text)
          ORDR=$(aws rds describe-db-instances --db-instance-identifier ecommerce-orders --query 'DBInstances[0].Endpoint.Address' --output text)
          echo "RDS endpoints: $MONO | $PROD | $ORDR"
          kubectl create secret generic db-credentials -n ecommerce \
            --from-literal=username=postgres --from-literal=password=PostgresEks2026 \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap monolith-config -n ecommerce \
            --from-literal=SPRING_PROFILES_ACTIVE=prod \
            --from-literal=SPRING_DATASOURCE_URL="jdbc:postgresql://$MONO:5432/monolith" \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap product-service-config -n ecommerce \
            --from-literal=DB_URL="jdbc:postgresql://$PROD:5432/products" \
            --from-literal=KAFKA_BOOTSTRAP_SERVERS=localhost:9092 \
            --from-literal=KAFKA_API_KEY=dummy --from-literal=KAFKA_API_SECRET=dummy \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap order-service-config -n ecommerce \
            --from-literal=DB_URL="jdbc:postgresql://$ORDR:5432/orders" \
            --from-literal=PRODUCT_SERVICE_URL=http://product-service:8081 \
            --from-literal=CUSTOMER_SERVICE_URL=http://monolith:8080 \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl create configmap gateway-config -n ecommerce \
            --from-literal=MONOLITH_URL=http://monolith:8080 \
            --from-literal=PRODUCT_SERVICE_URL=http://product-service:8081 \
            --from-literal=ORDER_SERVICE_URL=http://order-service:8082 \
            --dry-run=client -o yaml | kubectl apply -f -
          # tiny-node fit: one CoreDNS replica frees a pod slot
          kubectl scale deployment coredns -n kube-system --replicas=1 || true
          # clean slate then deploy the 4 services
          kubectl delete deployment monolith product-service order-service gateway -n ecommerce --ignore-not-found
          kubectl apply -f k8s/eks/apps.yaml

      - name: Show state (and explain any non-Running pods)
        run: |
          echo "=== nodes ==="
          kubectl get nodes -o wide
          echo "=== pods ==="
          sleep 120 # let Spring Boot + RDS connect + Flyway run before we check/test
          kubectl get pods -n ecommerce -o wide
          echo "=== events for any non-Running pod ==="
          kubectl get pods -n ecommerce --no-headers | grep -v ' Running ' | awk '{print $1}' | while read p; do
            echo "### $p"; kubectl describe pod "$p" -n ecommerce | grep -A6 Events:
          done || true

      - name: Smoke test APIs (port-forward from runner — only Running services respond)
        run: |
          test_svc() { # name svc port path
            kubectl port-forward -n ecommerce "svc/$2" "$3:$3" >/dev/null 2>&1 &
            pid=$!; sleep 5
            echo "--- $1 ($4) ---"
            curl -s -m 10 -w "\n[HTTP %{http_code}]\n" "http://localhost:$3$4" 2>&1 | head -c 400 || echo "unreachable (pod Pending?)"
            echo; kill $pid 2>/dev/null
          }
          test_svc monolith        monolith        8080 /api/customers
          test_svc product-service product-service 8081 /api/products
          test_svc order-service   order-service   8082 /api/orders
          test_svc gateway         gateway         8082 /api/products || true
