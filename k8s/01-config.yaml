# Sensitive values → Secret (stringData lets us write plain text; k8s base64-encodes it).
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: ecommerce
type: Opaque
stringData:
  username: postgres
  password: postgres
---
# Non-secret config → one ConfigMap per service (keys = the exact env var names the app reads).
apiVersion: v1
kind: ConfigMap
metadata:
  name: monolith-config
  namespace: ecommerce
data:
  SPRING_PROFILES_ACTIVE: prod
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-monolith:5432/monolith
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: product-service-config
  namespace: ecommerce
data:
  DB_URL: jdbc:postgresql://postgres-products:5432/products
  KAFKA_BOOTSTRAP_SERVERS: localhost:9092
  KAFKA_API_KEY: dummy
  KAFKA_API_SECRET: dummy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: order-service-config
  namespace: ecommerce
data:
  DB_URL: jdbc:postgresql://postgres-orders:5432/orders
  PRODUCT_SERVICE_URL: http://product-service:8081
  CUSTOMER_SERVICE_URL: http://monolith:8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: ecommerce
data:
  MONOLITH_URL: http://monolith:8080
  PRODUCT_SERVICE_URL: http://product-service:8081
  ORDER_SERVICE_URL: http://order-service:8082
