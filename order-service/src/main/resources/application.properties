spring.application.name=order-service
server.port=${SERVER_PORT:8082}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
# Flyway owns the schema; Hibernate only validates that the entities match it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false

# Other services (order-service calls these over HTTP when creating an order)
# product.service.url  -> product-service: product name/price/categories for the product snapshot
# customer.service.url -> monolith: customer name for the customer snapshot
product.service.url=${PRODUCT_SERVICE_URL:http://localhost:8081}
customer.service.url=${CUSTOMER_SERVICE_URL:http://localhost:8080}

# Actuator
management.endpoints.web.exposure.include=health,metrics
management.endpoint.health.show-details=always
