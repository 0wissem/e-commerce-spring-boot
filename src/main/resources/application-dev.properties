# Dev profile: local PostgreSQL (run one in Docker). Activate with SPRING_PROFILES_ACTIVE=dev.
# Postgres everywhere — no H2. Defaults target a local container; override via env if needed.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/monolith}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
