name: Build and Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - master
      - dev
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/spring-boot-0:$IMAGE_TAG .
          docker push $ECR_REGISTRY/spring-boot-0:$IMAGE_TAG

      - name: Create Dockerrun.aws.json
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "'$ECR_REGISTRY'/spring-boot-0:'$IMAGE_TAG'",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 8080
              }
            ]
          }' > Dockerrun.aws.json

      - name: Ensure environment exists and is Ready
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_API_KEY: ${{ secrets.KAFKA_API_KEY }}
          KAFKA_API_SECRET: ${{ secrets.KAFKA_API_SECRET }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          PRODUCT_SERVICE_URL: ${{ secrets.PRODUCT_SERVICE_URL }}
        run: |
          STATUS=$(aws elasticbeanstalk describe-environments \
            --environment-names Dockerized-Monolothic-Env-Prod \
            --query 'Environments[?Status!=`Terminated`] | [0].Status' \
            --output text 2>/dev/null)

          if [ "$STATUS" = "None" ] || [ -z "$STATUS" ]; then
            echo "Environment does not exist — creating from scratch..."

            STACK=$(aws elasticbeanstalk list-available-solution-stacks \
              --query 'SolutionStacks[?contains(@, `running Docker`) && contains(@, `Amazon Linux 2023`)] | [0]' \
              --output text)
            echo "Solution stack: $STACK"

            python3 - <<PYEOF
          import json, os
          options = [
            {"Namespace": "aws:elasticbeanstalk:environment",          "OptionName": "EnvironmentType",      "Value": "SingleInstance"},
            {"Namespace": "aws:autoscaling:launchconfiguration",       "OptionName": "IamInstanceProfile",   "Value": "eb-ec2-ecr-pull-role"},
            {"Namespace": "aws:autoscaling:launchconfiguration",       "OptionName": "InstanceType",         "Value": "t3.small"},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "SPRING_PROFILES_ACTIVE",      "Value": "prod"},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "SPRING_DATASOURCE_URL",       "Value": os.environ["SPRING_DATASOURCE_URL"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "SPRING_DATASOURCE_USERNAME",  "Value": os.environ["SPRING_DATASOURCE_USERNAME"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "SPRING_DATASOURCE_PASSWORD",  "Value": os.environ["SPRING_DATASOURCE_PASSWORD"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "KAFKA_BOOTSTRAP_SERVERS",     "Value": os.environ["KAFKA_BOOTSTRAP_SERVERS"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "KAFKA_API_KEY",               "Value": os.environ["KAFKA_API_KEY"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "KAFKA_API_SECRET",            "Value": os.environ["KAFKA_API_SECRET"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "MAIL_USERNAME",               "Value": os.environ["MAIL_USERNAME"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "MAIL_PASSWORD",               "Value": os.environ["MAIL_PASSWORD"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "MAIL_FROM",                   "Value": os.environ["MAIL_FROM"]},
            {"Namespace": "aws:elasticbeanstalk:application:environment", "OptionName": "PRODUCT_SERVICE_URL",         "Value": os.environ["PRODUCT_SERVICE_URL"]},
          ]
          with open('eb-options.json', 'w') as f:
            json.dump(options, f)
          PYEOF

            aws elasticbeanstalk create-environment \
              --application-name spring-boot-0 \
              --environment-name Dockerized-Monolothic-Env-Prod \
              --solution-stack-name "$STACK" \
              --option-settings file://eb-options.json

            aws elasticbeanstalk wait environment-updated \
              --environment-names Dockerized-Monolothic-Env-Prod

          elif [ "$STATUS" != "Ready" ]; then
            echo "Environment status is $STATUS — rebuilding..."
            aws elasticbeanstalk rebuild-environment \
              --environment-name Dockerized-Monolothic-Env-Prod || true
            sleep 30
            aws elasticbeanstalk wait environment-updated \
              --environment-names Dockerized-Monolothic-Env-Prod
          else
            echo "Environment is Ready — proceeding with deploy."
          fi

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: eu-north-1
          application_name: spring-boot-0
          environment_name: Dockerized-Monolothic-Env-Prod
          version_label: ${{ github.sha }}
          deployment_package: Dockerrun.aws.json
          use_existing_version_if_available: true
