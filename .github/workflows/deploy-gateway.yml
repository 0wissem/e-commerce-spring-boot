name: Build and Push Gateway to ECR

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - dev
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC — no stored keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::110911131381:role/github-actions-ecr
          aws-region: eu-west-3

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/gateway:$IMAGE_TAG -t $ECR_REGISTRY/gateway:latest ./gateway
          docker push $ECR_REGISTRY/gateway:$IMAGE_TAG
          docker push $ECR_REGISTRY/gateway:latest
