name: Build and Deploy Gateway to Elastic Beanstalk

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'preprod'
        type: choice
        options: [preprod, prod]
  push:
    branches:
      - master
      - dev
    paths:
      - 'gateway/**'
      - '.github/workflows/deploy-gateway.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (ECR — always eu-north-1)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Reconfigure AWS credentials for EB region
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ github.ref == 'refs/heads/master' && 'eu-north-1' || 'eu-west-3' }}

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/gateway:$IMAGE_TAG ./gateway
          docker push $ECR_REGISTRY/gateway:$IMAGE_TAG

      - name: Create Dockerrun.aws.json
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo '{
            "AWSEBDockerrunVersion": "1",
            "Image": {
              "Name": "'$ECR_REGISTRY'/gateway:'$IMAGE_TAG'",
              "Update": "true"
            },
            "Ports": [
              {
                "ContainerPort": 8082
              }
            ]
          }' > Dockerrun.aws.json

      - name: Set environment based on branch
        run: |
          IS_PROD="false"
          if [ "${{ github.ref }}" = "refs/heads/master" ]; then IS_PROD="true"; fi
          if [ "${{ github.event.inputs.environment }}" = "prod" ]; then IS_PROD="true"; fi

          if [ "$IS_PROD" = "true" ]; then
            echo "ENV_NAME=${{ secrets.GATEWAY_EB_ENV }}" >> $GITHUB_ENV
            echo "REGION=eu-north-1" >> $GITHUB_ENV
          else
            echo "ENV_NAME=${{ secrets.PREPROD_GATEWAY_EB_ENV }}" >> $GITHUB_ENV
            echo "REGION=eu-west-3" >> $GITHUB_ENV
          fi

      - name: Wait for environment to be Ready
        run: |
          for i in $(seq 1 20); do
            STATUS=$(aws elasticbeanstalk describe-environments \
              --application-name gateway \
              --environment-names ${{ env.ENV_NAME }} \
              --region ${{ env.REGION }} \
              --query 'Environments[0].Status' --output text)
            echo "Status: $STATUS"
            [ "$STATUS" = "Ready" ] && break
            sleep 30
          done

      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v22
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          region: ${{ env.REGION }}
          application_name: gateway
          environment_name: ${{ env.ENV_NAME }}
          version_label: ${{ github.sha }}
          deployment_package: Dockerrun.aws.json
          use_existing_version_if_available: true