name: EKS status check

# Read-only: checks pods + tests APIs WITHOUT redeploying (so pods can settle).
# Trigger by pushing a change to this file, or re-run the run.
on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths: [".github/workflows/eks-status.yml"]

permissions:
  id-token: write
  contents: read

jobs:
  status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::110911131381:role/github-actions-terraform
          aws-region: eu-west-3
      - uses: azure/setup-kubectl@v4
      - run: aws eks update-kubeconfig --name ecommerce --region eu-west-3
      - name: Pods + events + API smoke (no deploy)
        run: |
          kubectl get pods -n ecommerce -o wide
          echo "=== events for any non-Running pod ==="
          kubectl get pods -n ecommerce --no-headers | grep -v ' Running ' | awk '{print $1}' | while read p; do
            echo "### $p"; kubectl describe pod "$p" -n ecommerce | grep -A8 Events: ; done || true
          echo "=== API smoke ==="
          t(){ kubectl port-forward -n ecommerce "svc/$1" "$2:$2" >/dev/null 2>&1 & pid=$!; sleep 5; echo "--- $1 $3 ---"; curl -s -m 10 -w "\n[HTTP %{http_code}]\n" "http://localhost:$2$3" | head -c 300; echo; kill $pid 2>/dev/null; }
          t monolith 8080 /api/customers
          t product-service 8081 /api/products
          t order-service 8082 /api/orders
          t gateway 8082 /api/products || true
